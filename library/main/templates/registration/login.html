<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
</head>

<body style="text-align:center; font-family:Arial; background:#f5f5f5; padding:30px;">

    <h2>📚 TBH Library Student Login</h2>
    

    <form method="POST" style="background:white; display:inline-block; padding:20px; border-radius:10px;">
        {% csrf_token %}

        <p>
            <input type="text" name="mobile" placeholder="Mobile Number" required
                   style="padding:10px; width:250px;">
        </p>

        <p>Date of Birth</p>

        <!-- DAY -->
        <select name="day" required style="padding:8px;">
            <option value="">Day</option>
            {% for i in days %}
                <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>

        <!-- MONTH -->
        <select name="month" required style="padding:8px;">
            <option value="">Month</option>
            <option value="1">Jan</option>
            <option value="2">Feb</option>
            <option value="3">Mar</option>
            <option value="4">Apr</option>
            <option value="5">May</option>
            <option value="6">Jun</option>
            <option value="7">Jul</option>
            <option value="8">Aug</option>
            <option value="9">Sep</option>
            <option value="10">Oct</option>
            <option value="11">Nov</option>
            <option value="12">Dec</option>
        </select>

        <!-- YEAR -->
        <select name="year" required style="padding:8px;">
            <option value="">Year</option>
            {% for y in years %}
                <option value="{{ y }}">{{ y }}</option>
            {% endfor %}
        </select>

        <br><br>

        <button type="submit"
                style="padding:10px 20px; background:green; color:white; border:none; border-radius:5px;">
            Login
        </button>
    </form>

    {% if error %}
        <p style="color:red; margin-top:15px;">{{ error }}</p>
    {% endif %}

</body>
</html>
